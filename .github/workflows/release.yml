name: Release

# Builds the Tauri app on every tag push for macOS, Windows and Ubuntu/Linux
# and attaches the bundles (DMG / NSIS installer / deb+AppImage) to a GitHub
# Release.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    env:
      DATABASE_URL: sqlite:./ci_check.db
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features sqlite

      - name: Prepare database
        run: |
          sqlx database create
          sqlx migrate run --source crates/ls-core/src/db/migrations

      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LifeSort ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for details. Not code-signed/notarized: macOS Gatekeeper and Windows SmartScreen will show warnings on first run.'
          releaseDraft: false
          prerelease: false

      - name: Upload stable-named DMG (for README download link)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dmg=$(find target/release/bundle/dmg -name "*.dmg" | head -1)
          cp "$dmg" LifeSort.dmg
          gh release upload "${{ github.ref_name }}" LifeSort.dmg --clobber --repo ${{ github.repository }}

      - name: Upload stable-named installer (for README download link)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem -Path "target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "LifeSort-Setup.exe"
          gh release upload "${{ github.ref_name }}" "LifeSort-Setup.exe" --clobber --repo ${{ github.repository }}

      - name: Upload stable-named AppImage (for README download link)
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          appimage=$(find target/release/bundle/appimage -name "*.AppImage" | head -1)
          cp "$appimage" LifeSort.AppImage
          gh release upload "${{ github.ref_name }}" LifeSort.AppImage --clobber --repo ${{ github.repository }}
