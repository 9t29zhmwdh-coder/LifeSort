name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  DATABASE_URL: sqlite:./ci_check.db

jobs:
  check:
    name: Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features sqlite
      - name: Prepare database
        run: |
          sqlx database create
          sqlx migrate run --source crates/ls-core/src/db/migrations
      - name: cargo check
        run: cargo check --workspace
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
      - name: cargo test
        run: cargo test --workspace

  frontend:
    name: Frontend typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Typecheck & build
        run: npm run build
        working-directory: frontend

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      # RUSTSEC-2026-0194/-0195: quick-xml DoS, transitiv via tauri->plist; kein Upstream-Fix
      # (>= quick-xml 0.41). Im Desktop-Kontext nicht exploitierbar. Entfernen sobald Tauri aktualisiert.
      - run: cargo audit --ignore RUSTSEC-2024-0370 --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195

