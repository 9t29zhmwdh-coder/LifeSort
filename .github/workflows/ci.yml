name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  SQLX_OFFLINE: "true"

jobs:
  check:
    name: Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - name: cargo check
        run: cargo check --workspace --exclude lifesort-tauri
      - name: cargo clippy
        run: cargo clippy --workspace --exclude lifesort-tauri -- -D warnings
      - name: cargo test
        run: cargo test --workspace --exclude lifesort-tauri

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit --ignore RUSTSEC-2024-0370 --ignore RUSTSEC-2023-0071
